<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>AdelieAI console</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root { --bd: #e5e5e5; --muted: #888; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; max-width: 1100px; margin: 0 auto; padding: 1rem; color: #222; }
        nav { display: flex; gap: 1rem; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--bd); margin-bottom: 1rem; }
        nav .grow { flex: 1; }
        nav a { color: #0d6efd; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        h2 { margin-top: 0.5rem; }
        .row { display: grid; grid-template-columns: 110px 1fr 110px 90px 220px; gap: 0.75rem; padding: 0.5rem 0.4rem; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .row.head { font-weight: 600; color: #555; background: #fafafa; border-bottom: 1px solid var(--bd); }
        .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.8em; font-weight: 600; }
        .pill.pending { background: #fff3cd; color: #664d03; }
        .pill.running { background: #cfe2ff; color: #084298; }
        .pill.completed { background: #d1e7dd; color: #0a3622; }
        .pill.failed { background: #f8d7da; color: #58151c; }
        .pill.cancelled { background: #e2e3e5; color: #41464b; }
        button { cursor: pointer; padding: 4px 10px; font-size: 0.85em; border: 1px solid #ccc; background: white; border-radius: 4px; }
        button:hover { background: #f0f0f0; }
        button.danger:hover { background: #f8d7da; }
        form.inline { display: inline; }
        .muted { color: var(--muted); font-size: 0.85em; }
        a { color: #0d6efd; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { font-family: ui-monospace, monospace; font-size: 0.9em; }
        .create-form { display: flex; gap: 0.5rem; align-items: end; padding: 0.75rem; background: #f8f9fa; border-radius: 6px; margin-bottom: 1rem; }
        .create-form label { display: flex; flex-direction: column; gap: 2px; font-size: 0.85em; color: #555; }
        .create-form input { padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95em; }
        .create-form input[name=goal] { width: 360px; }
        .create-form input[name=model_spec] { width: 180px; }
        dl { display: grid; grid-template-columns: 110px 1fr; gap: 6px 16px; }
        dt { color: var(--muted); font-size: 0.9em; }
        dd { margin: 0; }
        table.events { border-collapse: collapse; width: 100%; }
        table.events th, table.events td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
        table.events th { background: #fafafa; font-weight: 600; font-size: 0.85em; color: #555; }
        table.events td.muted { color: var(--muted); }
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        button:disabled { opacity: 0.5; cursor: wait; }
        .answer-card { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 1rem; margin-top: 0.5rem; white-space: pre-wrap; line-height: 1.5; }
    </style>
</head>
<body>
    <nav>
        <span style="display: inline-flex; align-items: center; gap: 8px; font-weight: 700;">
            <img src="/static/adelie.png" width="32" height="32" alt="AdelieAI" style="border-radius: 4px;">
            AdelieAI
        </span>
        <a href="/web/personas">Personas</a>
        <a href="/web/sessions">Sessions</a>
        <a href="/web/docs">Docs</a>
        <a href="/docs">API docs</a>
        <span class="muted" style="font-size: 0.85em;" title="Active LLM (loaded into app.state.llm)">
            llm: <code>{{ request.app.state.llm.model_id }}</code>
        </span>
        <span class="grow"></span>
        <form action="/web/whoami" method="post">
            <label class="muted">User: <input type="text" name="user_id" value="{{ user_id }}" style="width: 100px; padding: 2px 6px; border: 1px solid #ccc; border-radius: 3px;"></label>
            <button type="submit">switch</button>
        </form>
    </nav>
    <main>
        {% block main %}{% endblock %}
    </main>
</body>
</html>
