{% extends "base.html" %}
{% block main %}
<h2>Personas <span class="muted">({{ user_id }})</span></h2>
<p class="muted" style="margin-top: -0.4rem;">
    Pick a character. Each one stays in voice across the whole conversation; per-turn token use and latency surface inline.
</p>

<div class="persona-grid">
    {% for p in personas %}{% include "personas/_card.html" %}{% endfor %}
</div>

<style>
.persona-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
}
.persona-card {
    border: 1px solid var(--bd);
    border-radius: 8px;
    padding: 1rem;
    text-decoration: none;
    color: #222;
    background: white;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    transition: border-color 120ms, transform 120ms;
}
.persona-card:hover {
    border-color: #0d6efd;
    transform: translateY(-1px);
    text-decoration: none;
}
.persona-card .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
}
.persona-card .emoji {
    font-size: 2.2rem;
    line-height: 1;
}
.tier-badge {
    font-family: ui-monospace, monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
}
.tier-T1 { background: #f1f3f5; color: #6c757d; border: 1px solid #ced4da; }
.tier-T2 { background: #e7f5ee; color: #1a7548; border: 1px solid #b6e3c8; }
.tier-T3 { background: #fff4e0; color: #b46a00; border: 1px solid #f5cf95; }
.tier-T4 { background: #ede7f6; color: #5e3aa1; border: 1px solid #c8b6e6; }
.tier-T5 { background: #ffe9ec; color: #b02a4c; border: 1px solid #f5b7c0; }

.industry-row { margin-top: -0.1rem; }
.industry-pill {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f1f3f5;
    color: #495057;
    border: 1px solid #dee2e6;
}
.industry-pill code {
    font-size: 0.95em;
    color: inherit;
    background: none;
}
.industry-gaming    { background: #fff4e0; color: #a4660a; border-color: #f5cf95; }
.industry-legal     { background: #e9ecef; color: #343a40; border-color: #adb5bd; }
.industry-knowledge { background: #ede7f6; color: #5e3aa1; border-color: #c8b6e6; }
.industry-general   { background: #e7f5ee; color: #1a7548; border-color: #b6e3c8; }

.persona-card .name {
    font-weight: 600;
    font-size: 1.05em;
}
.persona-card .desc {
    color: var(--muted);
    font-size: 0.85em;
    line-height: 1.4;
}
.persona-card dl.meta {
    display: grid;
    grid-template-columns: 70px 1fr;
    gap: 2px 8px;
    font-size: 0.78em;
    color: #555;
    margin: 0.4rem 0 0;
}
.persona-card dl.meta dt { color: var(--muted); }
.persona-card dl.meta dd { margin: 0; font-family: ui-monospace, monospace; }
</style>
{% endblock %}
